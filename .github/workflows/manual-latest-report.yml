name: Manual Latest Report

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "How many past hours to analyze (max 168 in app logic)"
        required: false
        default: "24"
      top:
        description: "How many stories to include"
        required: false
        default: "5"
      insecure_llm_ssl:
        description: "Disable TLS cert verification for OpenAI calls (debug only)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-latest-report:
    if: github.actor == 'ToniDonDoni'
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate report
        run: |
          ARGS="--hours ${{ github.event.inputs.hours }} --top ${{ github.event.inputs.top }}"
          if [ "${{ github.event.inputs.insecure_llm_ssl }}" = "true" ]; then
            ARGS="$ARGS --insecure-llm-ssl"
          fi
          python -m src.main run $ARGS

      - name: Upload latest HTML and exports
        uses: actions/upload-artifact@v4
        with:
          name: latest-report-${{ github.run_number }}
          path: |
            output/latest.html
            output/top*.html
            output/top*.json
            output/top*.md
          if-no-files-found: error
